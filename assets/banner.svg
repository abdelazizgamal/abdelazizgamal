<?xml version="1.0" encoding="UTF-8"?>
<svg width="1600" height="500" viewBox="0 0 1600 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#1f2937" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1600" height="500" fill="url(#bg)"/>
  <rect width="1600" height="500" fill="url(#grid)" opacity="0.35"/>

  <rect x="70" y="70" rx="22" ry="22" width="95" height="95"
        fill="none" stroke="url(#accent)" stroke-width="3"/>

  <text x="95" y="133" font-family="JetBrains Mono, monospace"
        font-size="44" font-weight="700" fill="#F8FAFC">AG</text>

  <text x="70" y="225"
        font-family="Inter, Arial"
        font-size="54"
        font-weight="700"
        fill="#F8FAFC">
      Abdelaziz Gamal
  </text>

  <text x="70" y="270"
        font-family="Inter"
        font-size="28"
        fill="#60A5FA">
      Software Engineer
  </text>

  <text x="70" y="330"
        font-family="Inter"
        font-size="36"
        font-weight="600"
        fill="#F8FAFC">
      Engineering intelligent products
  </text>

  <text x="70" y="372"
        font-family="Inter"
        font-size="36"
        font-weight="600"
        fill="#F8FAFC">
      from end to end.
  </text>

  <text x="70" y="440"
        font-family="JetBrains Mono"
        font-size="22"
        fill="#94A3B8">
      Full Stack • AI • Cloud
  </text>

  <g stroke="#60A5FA" stroke-width="2" fill="none" filter="url(#glow)">
    <line x1="1040" y1="140" x2="1180" y2="210"/>
    <line x1="1180" y1="210" x2="1340" y2="170"/>
    <line x1="1180" y1="210" x2="1180" y2="320"/>
    <line x1="1180" y1="320" x2="1325" y2="390"/>
    <circle cx="1040" cy="140" r="10" fill="#3B82F6">
      <animate attributeName="r" values="8;11;8" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1180" cy="210" r="10" fill="#8B5CF6">
      <animate attributeName="opacity" values="1;.5;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1340" cy="170" r="10" fill="#3B82F6"/>
    <circle cx="1180" cy="320" r="10" fill="#3B82F6"/>
    <circle cx="1325" cy="390" r="10" fill="#8B5CF6"/>
  </g>

  <text x="1010" y="118" fill="#94A3B8" font-size="18" font-family="JetBrains Mono">AI</text>
  <text x="1348" y="164" fill="#94A3B8" font-size="18" font-family="JetBrains Mono">API</text>
  <text x="1132" y="346" fill="#94A3B8" font-size="18" font-family="JetBrains Mono">ASP.NET</text>
  <text x="1328" y="420" fill="#94A3B8" font-size="18" font-family="JetBrains Mono">Cloud</text>
</svg>
